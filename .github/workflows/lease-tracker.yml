name: Lease Tracker

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This approximates frequent daytime checks for Chicago in CDT.
    - cron: "13,43 12-23 * * *"
    - cron: "13,43 0-4 * * *"
    - cron: "17 5-11/2 * * *"

concurrency:
  group: lease-tracker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Scrapling browser dependencies
        run: scrapling install

      - name: Run tracker
        run: python tracker.py run-once
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_ENABLED: ${{ vars.DEEPSEEK_ENABLED || '0' }}
          SCRAPLING_ENABLED: ${{ vars.SCRAPLING_ENABLED || '1' }}
          SCRAPLING_FETCHER: ${{ vars.SCRAPLING_FETCHER || 'stealthy' }}
          SCRAPLING_SOLVE_CLOUDFLARE: ${{ vars.SCRAPLING_SOLVE_CLOUDFLARE || '1' }}
          SCRAPLING_TIMEOUT_MS: ${{ vars.SCRAPLING_TIMEOUT_MS || '60000' }}
          SCRAPLING_WAIT_MS: ${{ vars.SCRAPLING_WAIT_MS || '2500' }}
          SCRAPLING_NETWORK_IDLE: ${{ vars.SCRAPLING_NETWORK_IDLE || '0' }}

      - name: Sync WeCom document mirror
        run: |
          if [ -z "$WECOM_UNITS_WEBHOOK_URL" ] || [ -z "$WECOM_SOURCE_STATUS_WEBHOOK_URL" ] || [ -z "$WECOM_RUN_LOG_WEBHOOK_URL" ]; then
            echo "Skipping WeCom document mirror sync; sync secrets are not configured."
            exit 0
          fi
          python tracker.py wecom-doc-sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          WECOM_UNITS_WEBHOOK_URL: ${{ secrets.WECOM_UNITS_WEBHOOK_URL }}
          WECOM_SOURCE_STATUS_WEBHOOK_URL: ${{ secrets.WECOM_SOURCE_STATUS_WEBHOOK_URL }}
          WECOM_RUN_LOG_WEBHOOK_URL: ${{ secrets.WECOM_RUN_LOG_WEBHOOK_URL }}
          WECOM_WEBHOOK_SYNC_ALLOW_BOOTSTRAP: ${{ vars.WECOM_WEBHOOK_SYNC_ALLOW_BOOTSTRAP || '0' }}
